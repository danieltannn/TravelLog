<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="PlaceLog">
<meta name="theme-color" content="#000000">
<title>PlaceLog</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#000;--s1:#0a0a0a;--s2:#111;--s3:#1a1a1a;--s4:#222;
  --border:#2a2a2a;--border2:#333;--text:#fff;--t2:#aaa;--t3:#555;
  --green:#4caf50;--gold:#f5c518;--red:#ff453a;
  --r:14px;--rs:10px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden;padding-bottom:86px;}
.header{background:rgba(0,0,0,.95);border-bottom:1px solid var(--border);padding:50px 18px 14px;position:sticky;top:0;z-index:200;backdrop-filter:blur(24px);}
.hrow{display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:20px;font-weight:800;letter-spacing:-.5px;}
.logo span{color:var(--t3);}
.hbtns{display:flex;gap:8px;}
.hbtn{background:var(--s3);border:1px solid var(--border2);border-radius:8px;padding:6px 13px;font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;font-family:inherit;white-space:nowrap;}
.hbtn.primary{background:#fff;color:#000;border-color:#fff;}
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,.96);border-top:1px solid var(--border);display:flex;padding:8px 0 28px;z-index:200;backdrop-filter:blur(20px);}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;}
.ni-ic{font-size:20px;color:var(--t3);transition:color .2s;}
.ni-lb{font-size:10px;color:var(--t3);letter-spacing:.2px;transition:color .2s;}
.ni.active .ni-ic,.ni.active .ni-lb{color:#fff;}
.screen{display:none;padding:14px;}
.screen.active{display:block;}
label.fl{font-size:11px;color:var(--t3);display:block;margin-bottom:5px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;}
input.fi,select.fi,textarea.fi{width:100%;background:var(--s2);border:1px solid var(--border2);border-radius:var(--rs);padding:11px 13px;color:#fff;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;-webkit-appearance:none;resize:none;}
input.fi:focus,select.fi:focus,textarea.fi:focus{border-color:#555;}
input.fi::placeholder,textarea.fi::placeholder{color:var(--t3);}
select.fi option{background:#111;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fg{margin-bottom:12px;}
.btn{display:block;width:100%;padding:13px;border-radius:var(--r);border:none;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:transform .15s;}
.btn:active{transform:scale(.97);}
.btn-p{background:#fff;color:#000;}
.btn-s{background:var(--s3);border:1px solid var(--border2);color:var(--t2);margin-top:8px;}
.btn-red{background:rgba(255,69,58,.1);border:1px solid rgba(255,69,58,.3);color:var(--red);margin-top:8px;}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 2px;}
.section-title{font-size:16px;font-weight:700;}
.empty{text-align:center;padding:44px 20px;color:var(--t3);}
.empty-ic{font-size:40px;margin-bottom:10px;opacity:.4;}
.empty-t{font-size:15px;font-weight:600;color:var(--t2);margin-bottom:5px;}
.empty-s{font-size:12px;line-height:1.6;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;align-items:flex-end;backdrop-filter:blur(8px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--s1);border-radius:20px 20px 0 0;padding:20px 18px 40px;width:100%;max-height:92vh;overflow-y:auto;border-top:1px solid var(--border2);}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 18px;}
.modal-title{font-size:18px;font-weight:800;margin-bottom:18px;}
.country-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;cursor:pointer;}
.country-header{padding:16px;display:flex;align-items:center;gap:12px;}
.country-flag{font-size:28px;flex-shrink:0;}
.country-info{flex:1;min-width:0;}
.country-name{font-size:16px;font-weight:700;}
.country-meta{font-size:12px;color:var(--t3);margin-top:3px;}
.country-stats{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
.cstat{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;}
.cstat.visited{background:rgba(76,175,80,.12);color:var(--green);border:1px solid rgba(76,175,80,.2);}
.cstat.unvisited{background:rgba(85,85,85,.15);color:var(--t3);border:1px solid var(--border);}
.cstat.partial{background:rgba(245,197,24,.1);color:var(--gold);border:1px solid rgba(245,197,24,.2);}
.back-btn{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--t2);cursor:pointer;margin-bottom:14px;padding:4px 0;}
.cdh-stat{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;text-align:center;}
.cdh-stat-val{font-size:20px;font-weight:800;}
.cdh-stat-key{font-size:10px;color:var(--t3);margin-top:1px;text-transform:uppercase;letter-spacing:.3px;}
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-chip{flex-shrink:0;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;background:var(--s2);color:var(--t3);border:1px solid var(--border);white-space:nowrap;}
.filter-chip.active{background:#fff;color:#000;border-color:#fff;}
.city-section{margin-bottom:16px;}
.city-label{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--t3);margin-bottom:8px;}
.place-item{background:var(--s2);border-radius:var(--rs);padding:13px 14px;margin-bottom:6px;display:flex;align-items:center;gap:12px;border:1px solid var(--border);}
.place-item.vi{border-left:3px solid var(--green);}
.place-item.nv{border-left:3px solid var(--border2);}
.place-left{flex:1;min-width:0;}
.place-name{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.place-sub{font-size:11px;color:var(--t3);margin-top:3px;display:flex;align-items:center;gap:6px;}
.cat-dot{display:inline-block;width:6px;height:6px;border-radius:50%;}
.place-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}








.search-wrap{position:relative;margin-bottom:14px;}
.search-wrap input{padding-left:36px;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--t3);pointer-events:none;}




.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;}
textarea.bulk{min-height:120px;font-size:13px;line-height:1.6;}
.bulk-hint{font-size:11px;color:var(--t3);line-height:1.6;margin-top:6px;}
.sync-bar{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t3);padding:4px 0 0;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--t3);flex-shrink:0;}
.sync-dot.synced{background:var(--green);}
.sync-dot.syncing{background:var(--gold);animation:pulse 1s infinite;}
.sync-dot.error{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.loading-screen{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;gap:16px;}
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.city-toggle{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;}
.city-toggle-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none;-webkit-user-select:none;}
.city-toggle-left{display:flex;align-items:center;gap:10px;}
.city-toggle-name{font-size:15px;font-weight:700;letter-spacing:-.2px;}
.city-toggle-count{font-size:12px;color:var(--t3);font-weight:500;}
.city-toggle-arrow{font-size:14px;color:var(--t3);transition:transform .25s;display:inline-block;}
.city-toggle-arrow.open{transform:rotate(180deg);}
.city-toggle-body{display:none;border-top:1px solid var(--border);padding:0;}
.city-toggle-body.open{display:block;}
.nearby-group{padding:12px 14px 6px;}
.nearby-label{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--accent2);margin-bottom:8px;}
.nearby-dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);flex-shrink:0;}
.nearby-divider{height:1px;background:var(--border);margin:2px 14px 10px;}
</style>
</head>
<body>

<div class="header">

</div>

<script>
const WORKER = 'https://travellog-notion.danieltan-tan199889.workers.dev';
const DB_ID  = '383786af258080cfb455dfc4cab6a19c';

let places = [];
let currentCountry = null;
let activeFilter = 'All';
let activeSearch = '';
let editingId = null;

function setSync(status, label) {
  document.getElementById('syncDot').className = 'sync-dot ' + status;
  document.getElementById('syncLabel').textContent = label;
}

function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#fff;color:#000;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:9999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.6);';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

// ===== NOTION API =====
async function notionRequest(path, method, body) {
  const res = await fetch(WORKER + path, {
    method: method || 'GET',
    headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) {
    const e = await res.text();
    throw new Error(e);
  }
  return res.json();
}

function pageToPlace(page) {
  const p = page.properties;
  return {
    id: page.id,
    name: p.Name?.title?.[0]?.plain_text || '',
    country: p.Country?.rich_text?.[0]?.plain_text || '',
    flag: p.Flag?.rich_text?.[0]?.plain_text || '🌍',
    city: p.City?.rich_text?.[0]?.plain_text || 'General',
    category: p.Category?.select?.name || 'Other',
    address: p.Address?.rich_text?.[0]?.plain_text || '',
    district: p.District?.rich_text?.[0]?.plain_text || '',
    note: p.Notes?.rich_text?.[0]?.plain_text || ''
  };
}

function placeToNotion(place) {
  return {
    Name: { title: [{ text: { content: place.name } }] },
    Country: { rich_text: [{ text: { content: place.country } }] },
    Flag: { rich_text: [{ text: { content: place.flag } }] },
    City: { rich_text: [{ text: { content: place.city } }] },
    Category: { select: { name: place.category } },
    Address: { rich_text: [{ text: { content: place.address || '' } }] },
    Notes: { rich_text: [{ text: { content: place.note || '' } }] }
  };
}

async function loadPlaces() {
  setSync('syncing', 'Loading…');
  const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error('Request timed out')), 10000));
  try {
    let all = [], cursor = undefined;
    do {
      const body = { page_size: 100 };
      if (cursor) body.start_cursor = cursor;
      const res = await Promise.race([
        notionRequest('/v1/databases/' + DB_ID + '/query', 'POST', body),
        timeout
      ]);
      all = all.concat(res.results);
      cursor = res.has_more ? res.next_cursor : undefined;
    } while (cursor);
    places = all.map(pageToPlace).filter(p => p.name);
    setSync('synced', 'Synced · ' + new Date().toLocaleTimeString());
  } catch(e) {
    setSync('error', 'Load failed — tap to retry');
    showToast('⚠️ Could not load: ' + e.message);
  }
}

async function createPlace(place) {
  const res = await notionRequest('/v1/pages', 'POST', {
    parent: { database_id: DB_ID },
    properties: placeToNotion(place)
  });
  return res.id;
}

async function updatePlace(id, place) {
  await notionRequest('/v1/pages/' + id, 'PATCH', {
    properties: placeToNotion(place)
  });
}

async function archivePage(id) {
  await notionRequest('/v1/pages/' + id, 'PATCH', { archived: true });
}

// ===== MODAL =====
function openModal(id) {
  document.getElementById('modal-'+id).classList.add('open');
  document.body.style.overflow = 'hidden';
  document.body.style.position = 'fixed';
  document.body.style.width = '100%';
}
function closeModal(id) {
  document.getElementById('modal-'+id).classList.remove('open');
  const cr = document.getElementById('del-confirm');
  if (cr) cr.remove();
  document.body.style.overflow = '';
  document.body.style.position = '';
  document.body.style.width = '';
}
document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', e => {
  if (e.target === o) {
    o.classList.remove('open');
    const cr = document.getElementById('del-confirm');
    if (cr) cr.remove();
    document.body.style.overflow = '';
    document.body.style.position = '';
    document.body.style.width = '';
  }
}));

// ===== SCREENS =====
function showScreen(name, el) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.ni').forEach(n => n.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  if (el) el.classList.add('active');
  if (name === 'countries') { currentCountry = null; renderCountries(); }

}

// ===== HELPERS =====
function ce(cat) { return {Restaurant:'🍜',Attraction:'🏛️',Hotel:'🏨',Shopping:'🛍️',Nature:'🌿',Bar:'🍸',Other:'📍'}[cat]||'📍'; }
function cc(cat) { return {Restaurant:'#f0883e',Attraction:'#79c0ff',Hotel:'#e3b341',Shopping:'#bc8cff',Nature:'#4caf50',Bar:'#ff6b6b',Other:'#888'}[cat]||'#888'; }

function getCountries() {
  const map = {};
  places.forEach(p => {
    if (!map[p.country]) map[p.country] = { flag: p.flag||'🌍', places: [] };
    map[p.country].places.push(p);
  });
  return map;
}

// ===== COUNTRIES =====
function renderCountries() {
  const map = getCountries();
  const keys = Object.keys(map).sort();
  document.getElementById('countriesTitle').textContent = 'Countries (' + keys.length + ')';
  if (!keys.length) {
    document.getElementById('countriesList').innerHTML = '<div class="empty"><div class="empty-ic">🌍</div><div class="empty-t">No places yet</div><div class="empty-s">Tap "+ Place" to add your first place,<br>or use Bulk Import to add many at once.</div></div>';
    return;
  }
  document.getElementById('countriesList').innerHTML = keys.map(country => {
    const {flag, places: ps} = map[country];
    const tot = ps.length;
    const safeCountry = country.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return '<div class="country-card" onclick="openCountry(\''+safeCountry+'\')"><div class="country-header"><div class="country-flag">'+flag+'</div><div class="country-info"><div class="country-name">'+country+'</div><div class="country-meta">'+tot+' place'+(tot!==1?'s':'')+'</div></div><div style="font-size:18px;color:var(--t3);">›</div></div></div>';
  }).join('');
}

function openCountry(country) {
  currentCountry = country; activeFilter = 'All'; activeSearch = '';
  document.getElementById('screen-countries').classList.remove('active');
  document.getElementById('screen-places').classList.add('active');
  document.querySelectorAll('.ni').forEach((n,i) => n.classList.toggle('active', i===0));
  renderPlaces();
}
function goBack() {
  currentCountry = null;
  document.getElementById('screen-places').classList.remove('active');
  document.getElementById('screen-countries').classList.add('active');
  renderCountries();
}

// ===== NEARBY CLUSTERS =====
const NEARBY_CLUSTERS = {
  "Kyoto": [
    { area: "Arashiyama", places: ["Arashiyama Bamboo Forest","Togetsukyo Bridge","Daikakuji Temple","Nisonin Temple","Adashino Nenbutsuji Temple"] },
    { area: "Higashiyama (Lower)", places: ["Kiyomizu-dera","Ninenzaka","Sannenzaka"] },
    { area: "Higashiyama (Upper)", places: ["Ginkakuji Temple","Philosopher's Path"] },
    { area: "Northern Kyoto", places: ["Kinkaku-Ji"] },
    { area: "Fushimi", places: ["Fushimi Inari Shrine","Senbon Torii"] }
  ],
  "Osaka": [
    { area: "Namba & Dotonbori", places: ["Dotombori","Hozenji Yokocho Alley","Namba Parks","Kuromon Ichiba Market","Den Den Town"] },
    { area: "Shinsaibashi", places: ["Shinsaibashi-suji","Amerika-mura","Tachibana Street (Orange Street)"] },
    { area: "Umeda", places: ["Umeda Sky Building","Grand Front Osaka","Osaka Train Station","Hankyu Umeda Main Store","Herbis Plaza","Whity Umeda","Yodobashi-Umeda","Tenjinbashi-suji"] },
    { area: "Central Osaka", places: ["Osaka Castle","Nakazaki Cafe Street"] },
    { area: "South Osaka", places: ["USJ","Shitenno-ji"] }
  ]
};

let openCities = {};

function toggleCity(city) {
  openCities[city] = !openCities[city];
  const body = document.getElementById('city-body-' + city.replace(/\s+/g,'_'));
  const arrow = document.getElementById('city-arrow-' + city.replace(/\s+/g,'_'));
  if (body) body.classList.toggle('open', openCities[city]);
  if (arrow) arrow.classList.toggle('open', openCities[city]);
}

function groupByNearby(city, places) {
  // First try grouping by District field from Notion
  const withDistrict = places.filter(p => p.district);
  if (withDistrict.length > 0) {
    const districtMap = {};
    const noDistrict = [];
    places.forEach(p => {
      if (p.district) {
        if (!districtMap[p.district]) districtMap[p.district] = [];
        districtMap[p.district].push(p);
      } else {
        noDistrict.push(p);
      }
    });
    const groups = Object.entries(districtMap).map(([area, items]) => ({ area, items }));
    if (noDistrict.length > 0) groups.push({ area: null, items: noDistrict });
    return groups;
  }
  // Fallback to hardcoded clusters
  const clusters = NEARBY_CLUSTERS[city];
  if (!clusters) return [{ area: null, items: places }];
  const assigned = new Set();
  const groups = [];
  for (const cluster of clusters) {
    const items = places.filter(p => cluster.places.includes(p.name));
    if (items.length > 0) {
      groups.push({ area: cluster.area, items });
      items.forEach(p => assigned.add(p.id));
    }
  }
  const rest = places.filter(p => !assigned.has(p.id));
  if (rest.length > 0) groups.push({ area: null, items: rest });
  return groups;
}

function renderPlaceCard(p) {
  return '<div class="place-item">'
    + '<div class="place-left" onclick="openEditPlace(\'' + p.id + '\')" style="cursor:pointer;">'
    + '<div class="place-name">' + p.name + '</div>'
    + '<div class="place-sub"><span class="cat-dot" style="background:' + cc(p.category) + ';margin-right:2px;"></span><span>' + p.category + '</span>'
    + (p.address ? '<span> · 📍 ' + p.address + '</span>' : '')
    + (p.note ? '<span> · ' + p.note.slice(0,20) + (p.note.length > 20 ? '…' : '') + '</span>' : '')
    + '</div></div>'
    + '<div class="place-right">'
    + '<button class="vbtn" style="background:rgba(255,69,58,.12);color:#ff453a;font-size:13px;" onclick="quickDelete(\'' + p.id + '\')">🗑️</button>'
    + '</div></div>';
}

function renderPlaces() {
  const country = currentCountry;
  const flag = (getCountries()[country]||{}).flag||'🌍';
  let all = places.filter(p => p.country === country);
  const cats = ['All',...[...new Set(all.map(p=>p.category))].sort()];

  let filtered = all.slice();
  if (activeFilter !== 'All') filtered = filtered.filter(p => p.category === activeFilter);
  if (activeSearch) filtered = filtered.filter(p => p.name.toLowerCase().includes(activeSearch.toLowerCase()) || (p.city||'').toLowerCase().includes(activeSearch.toLowerCase()));
  const cities = [...new Set(filtered.map(p=>p.city||'Uncategorised'))].sort();

  let html = '<div class="back-btn" onclick="goBack()">← All Countries</div>'
    +'<div style="padding:4px 0 16px;border-bottom:1px solid var(--border);margin-bottom:14px;">'
    +'<div style="font-size:40px;margin-bottom:8px;">'+flag+'</div>'
    +'<div style="font-size:26px;font-weight:800;letter-spacing:-.6px;">'+country+'</div>'
    +'<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;">'
    +'<div class="cdh-stat"><div class="cdh-stat-val">'+all.length+'</div><div class="cdh-stat-key">Places</div></div>'
    
    
    +'</div></div>'
    +'<div class="search-wrap"><span class="search-icon">🔍</span><input class="fi" id="placeSearch" placeholder="Search places…" value="'+activeSearch+'" oninput="activeSearch=this.value;renderPlaces()"></div>'
    +'<div class="filter-row">'+cats.map(c=>'<div class="filter-chip'+(activeFilter===c?' active':'')+'" onclick="activeFilter=\''+c+'\';renderPlaces()">'+(c==='All'?'All':ce(c)+' '+c)+'</div>').join('')+'</div>';

  if (!filtered.length) {
    html += '<div class="empty"><div class="empty-ic">📍</div><div class="empty-t">No places found</div></div>';
  } else {
    html += cities.map(city => {
      const cp = filtered.filter(p=>(p.city||'Uncategorised')===city);
      const cityKey = city.replace(/\s+/g,'_');
      if (openCities[city] === undefined) openCities[city] = true; // open by default
      const groups = groupByNearby(city, cp);
      const groupsHtml = groups.map(g => {
        const items = g.items.map(p => renderPlaceCard(p)).join('');
        if (g.area) {
          return '<div class="nearby-group">'
            + '<div class="nearby-label"><span class="nearby-dot"></span>' + g.area + '</div>'
            + items
            + '</div><div class="nearby-divider"></div>';
        } else {
          return '<div class="nearby-group">' + items + '</div>';
        }
      }).join('');
      return '<div class="city-toggle">'
        + '<div class="city-toggle-header" onclick="toggleCity(\'' + city + '\')">'
        + '<div class="city-toggle-left">'
        + '<div class="city-toggle-name">' + city + '</div>'
        + '<div class="city-toggle-count">' + cp.length + ' place' + (cp.length !== 1 ? 's' : '') + '</div>'
        + '</div>'
        + '<span class="city-toggle-arrow' + (openCities[city] ? ' open' : '') + '" id="city-arrow-' + cityKey + '">⌄</span>'
        + '</div>'
        + '<div class="city-toggle-body' + (openCities[city] ? ' open' : '') + '" id="city-body-' + cityKey + '">'
        + groupsHtml
        + '</div>'
        + '</div>';
    }).join('');
  }
  html += '<button class="btn btn-s" style="margin-top:4px;" onclick="openAddPlace()">+ Add place to '+country+'</button>';
  document.getElementById('placesContent').innerHTML = html;
  if (activeSearch) { const inp=document.getElementById('placeSearch'); if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);} }
}



// ===== SWIPE DOWN TO CLOSE MODAL =====
(function() {
  let startY = 0, startScrollTop = 0, dragging = false;
  document.querySelectorAll('.modal').forEach(modal => {
    modal.addEventListener('touchstart', e => {
      startY = e.touches[0].clientY;
      startScrollTop = modal.scrollTop;
      dragging = true;
    }, { passive: true });
    modal.addEventListener('touchmove', e => {
      if (!dragging) return;
      const dy = e.touches[0].clientY - startY;
      if (dy > 0 && modal.scrollTop === 0) {
        modal.style.transform = 'translateY(' + Math.min(dy, 200) + 'px)';
        modal.style.transition = 'none';
      }
    }, { passive: true });
    modal.addEventListener('touchend', e => {
      if (!dragging) return;
      dragging = false;
      const dy = e.changedTouches[0].clientY - startY;
      modal.style.transition = 'transform 0.3s ease';
      if (dy > 100 && modal.scrollTop === 0) {
        modal.style.transform = 'translateY(100%)';
        setTimeout(() => {
          modal.style.transform = '';
          modal.style.transition = '';
          const overlay = modal.closest('.modal-overlay');
          if (overlay) {
            overlay.classList.remove('open');
            const cr = document.getElementById('del-confirm');
            if (cr) cr.remove();
            document.body.style.overflow = '';
            document.body.style.position = '';
            document.body.style.width = '';
          }
        }, 300);
      } else {
        modal.style.transform = '';
        setTimeout(() => { modal.style.transition = ''; }, 300);
      }
    }, { passive: true });
  });
})();

// ===== GOOGLE MAPS =====
function openMaps() {
  const p = places.find(x => x.id === editingId);
  if (!p) return;
  const query = encodeURIComponent(p.name + ' ' + p.city + ' ' + p.country);
  window.open('https://www.google.com/maps/search/?api=1&query=' + query, '_blank');

// ===== QUICK DELETE =====
function quickDelete(id) {
  const p = places.find(x => x.id === id);
  if (!p) return;
  // Show inline confirm toast on the card
  const existing = document.getElementById('qd-'+id);
  if (existing) { existing.remove(); return; }
  const row = document.createElement('div');
  row.id = 'qd-'+id;
  row.style.cssText = 'background:rgba(255,69,58,.1);border:1px solid rgba(255,69,58,.3);border-radius:10px;padding:10px 12px;margin-top:6px;display:flex;align-items:center;justify-content:space-between;gap:8px;';
  row.innerHTML = '<span style="font-size:12px;color:#ff453a;font-weight:600;">Delete '+p.name+'?</span>'
    +'<div style="display:flex;gap:6px;">'
    +'<button onclick="doQuickDelete(\''+id+'\')" style="padding:6px 12px;background:#ff453a;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">Delete</button>'
    +'<button onclick="document.getElementById(\'qd-'+id+'\').remove()" style="padding:6px 12px;background:var(--s3);color:var(--t2);border:1px solid var(--border2);border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;">Cancel</button>'
    +'</div>';
  // Insert after the place item
  const allItems = document.querySelectorAll('.place-item');
  let target = null;
  allItems.forEach(el => { if (el.innerHTML.includes(id)) target = el; });
  if (target) target.after(row); else document.getElementById('placesContent').appendChild(row);
}
async function doQuickDelete(id) {
  const row = document.getElementById('qd-'+id);
  if (row) row.remove();
  try {
    setSync('syncing', 'Deleting…');
    await archivePage(id);
    places = places.filter(p => p.id !== id);
    setSync('synced', 'Deleted · ' + new Date().toLocaleTimeString());
    renderPlaces();
    showToast('🗑️ Place deleted');
  } catch(e) {
    setSync('error', 'Delete failed');
    showToast('⚠️ Failed: ' + e.message);
  }
}

// ===== ADD PLACE =====
function openAddPlace() {
  document.getElementById('p-name').value='';
  document.getElementById('p-country').value=currentCountry||'';
  const map = getCountries();
  document.getElementById('p-flag').value=currentCountry&&map[currentCountry]?map[currentCountry].flag:'';
  document.getElementById('p-city').value='';
  document.getElementById('p-address').value='';
  document.getElementById('p-district').value='';
  document.getElementById('p-note').value='';
  openModal('add-place');
}
async function savePlace() {
  const name = document.getElementById('p-name').value.trim();
  const country = document.getElementById('p-country').value.trim();
  if (!name||!country) { showToast('⚠️ Enter a place name and country'); return; }
  const btn = document.getElementById('savePlaceBtn');
  btn.textContent = 'Saving…'; btn.disabled = true;
  const place = {
    name, country,
    flag: document.getElementById('p-flag').value.trim()||'🌍',
    city: document.getElementById('p-city').value.trim()||'General',
    category: document.getElementById('p-cat').value,
    address: document.getElementById('p-address').value.trim(),
    district: document.getElementById('p-district').value.trim(),
    note: document.getElementById('p-note').value.trim()
  };
  try {
    setSync('syncing', 'Saving…');
    const id = await createPlace(place);
    place.id = id;
    places.push(place);
    setSync('synced', 'Saved · ' + new Date().toLocaleTimeString());
    closeModal('add-place');
    if (currentCountry === country) renderPlaces(); else renderCountries();
    showToast('✅ Place saved!');
  } catch(e) {
    setSync('error', 'Save failed');
    showToast('⚠️ Failed: ' + e.message);
  }
  btn.textContent = 'Save Place'; btn.disabled = false;
}

// ===== EDIT PLACE =====
function openEditPlace(id) {
  editingId = id;
  const p = places.find(x => x.id === id);
  if (!p) return;
  document.getElementById('ep-name').value = p.name;
  document.getElementById('ep-city').value = p.city||'';
  document.getElementById('ep-cat').value = p.category;
  document.getElementById('ep-address').value = p.address||'';
  document.getElementById('ep-district').value = p.district||'';
  document.getElementById('ep-note').value = p.note||'';
  // Load Wikipedia image for the place
  loadPlaceImage(p);
  openModal('edit-place');
}

async function loadPlaceImage(p) {
  const imgWrap = document.getElementById('ep-img-wrap');
  const imgEl = document.getElementById('ep-img');
  const imgCaption = document.getElementById('ep-img-caption');
  imgWrap.style.display = 'block';
  imgEl.style.display = 'none';
  imgCaption.textContent = 'Loading image…';
  imgCaption.style.color = 'var(--t3)';
  try {
    // Use Wikipedia REST API with CORS-friendly endpoint
    const searchName = p.name.replace(/\s+/g, '_');
    const url = 'https://en.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(searchName);
    const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
    if (!res.ok) throw new Error('No page');
    const data = await res.json();
    if (data.originalimage && data.originalimage.source) {
      imgEl.onload = () => { imgEl.style.display = 'block'; };
      imgEl.onerror = () => { 
        imgEl.style.display = 'none';
        imgCaption.textContent = 'Image could not load';
        imgCaption.style.color = 'var(--t3)';
      };
      imgEl.crossOrigin = 'anonymous';
      imgEl.src = data.originalimage.source;
      imgCaption.textContent = data.description || p.name;
      imgCaption.style.color = 'var(--t2)';
    } else if (data.thumbnail && data.thumbnail.source) {
      imgEl.onload = () => { imgEl.style.display = 'block'; };
      imgEl.onerror = () => {
        imgEl.style.display = 'none';
        imgCaption.textContent = 'Image could not load';
        imgCaption.style.color = 'var(--t3)';
      };
      imgEl.src = data.thumbnail.source;
      imgCaption.textContent = data.description || p.name;
      imgCaption.style.color = 'var(--t2)';
    } else {
      throw new Error('No image');
    }
  } catch(e) {
    imgCaption.textContent = '📍 ' + p.name;
    imgCaption.style.color = 'var(--t3)';
  }
}
async function saveEditPlace() {
  if (!editingId) return;
  const p = places.find(x => x.id === editingId);
  if (!p) return;
  const btn = document.getElementById('editSaveBtn');
  btn.textContent = 'Saving…'; btn.disabled = true;
  p.name = document.getElementById('ep-name').value.trim()||p.name;
  p.city = document.getElementById('ep-city').value.trim()||'General';
  p.category = document.getElementById('ep-cat').value;
  p.address = document.getElementById('ep-address').value.trim();
  p.district = document.getElementById('ep-district').value.trim();
  p.note = document.getElementById('ep-note').value.trim();
  try {
    setSync('syncing', 'Saving…');
    await updatePlace(editingId, p);
    setSync('synced', 'Saved · ' + new Date().toLocaleTimeString());
    closeModal('edit-place');
    renderPlaces();
    showToast('✅ Changes saved!');
  } catch(e) {
    setSync('error', 'Save failed');
    showToast('⚠️ Failed: ' + e.message);
  }
  btn.textContent = 'Save Changes'; btn.disabled = false;
}
function deletePlace() {
  const existing = document.getElementById('del-confirm');
  if (existing) { existing.remove(); return; }
  const row = document.createElement('div');
  row.id = 'del-confirm';
  row.style.cssText = 'background:rgba(255,69,58,.1);border:1px solid rgba(255,69,58,.3);border-radius:12px;padding:14px;margin-top:10px;text-align:center;';
  row.innerHTML = '<div style="font-size:13px;color:#ff453a;font-weight:600;margin-bottom:10px;">Remove this place?</div><div style="display:flex;gap:8px;"><button onclick="confirmDelete()" style="flex:1;padding:10px;background:#ff453a;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Yes, delete</button><button onclick="document.getElementById(\'del-confirm\').remove()" style="flex:1;padding:10px;background:var(--s3);color:var(--t2);border:1px solid var(--border2);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">Cancel</button></div>';
  document.querySelector('#modal-edit-place .modal').appendChild(row);
}
async function confirmDelete() {
  if (!editingId) return;
  try {
    setSync('syncing', 'Deleting…');
    await archivePage(editingId);
    places = places.filter(p => p.id !== editingId);
    editingId = null;
    setSync('synced', 'Deleted · ' + new Date().toLocaleTimeString());
    closeModal('edit-place');
    renderPlaces();
    showToast('🗑️ Place deleted');
  } catch(e) {
    setSync('error', 'Delete failed');
    showToast('⚠️ Failed: ' + e.message);
  }
}

// ===== BULK IMPORT =====
async function bulkImport() {
  const country = document.getElementById('bl-country').value.trim();
  const flag = document.getElementById('bl-flag').value.trim()||'🌍';
  const city = document.getElementById('bl-city').value.trim()||'General';
  const cat = document.getElementById('bl-cat').value;
  const raw = document.getElementById('bl-places').value;
  if (!country||!raw.trim()) { showToast('⚠️ Enter a country and some places'); return; }
  const names = raw.split(/[\n,]+/).map(s=>s.trim()).filter(Boolean);
  if (!names.length) { showToast('⚠️ No places found'); return; }
  const btn = document.getElementById('bulkBtn');
  btn.disabled = true;
  let added = 0;
  setSync('syncing', 'Importing…');
  for (const name of names) {
    if (places.find(p=>p.country===country&&p.name===name)) continue;
    try {
      btn.textContent = 'Importing ' + (added+1) + '/' + names.length + '…';
      const place = { name, country, flag, city, category: cat, address: '', note: '' };
      const id = await createPlace(place);
      place.id = id;
      places.push(place);
      added++;
    } catch(e) { console.error(e); }
  }
  setSync('synced', 'Saved · ' + new Date().toLocaleTimeString());
  closeModal('bulk');
  document.getElementById('bl-places').value = '';
  btn.textContent = 'Import Places'; btn.disabled = false;
  if (currentCountry === country) renderPlaces(); else { currentCountry = country; openCountry(country); }
  showToast('✅ ' + added + ' places imported!');
}

// ===== INIT =====
(async () => {
  try {
    await loadPlaces();
  } catch(e) {
    setSync('error', 'Load failed — ' + e.message);
    showToast('⚠️ Could not load: ' + e.message);
  } finally {
    document.getElementById('loadingScreen').style.display = 'none';
    renderCountries();
  }
})();
</script>
